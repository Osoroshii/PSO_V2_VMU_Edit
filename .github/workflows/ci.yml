name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Ubuntu's default python3 package excludes tkinter; macOS/Windows
      # runners already include it via actions/setup-python.
      - name: Install Tk (Ubuntu only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      # Syntax-check only (no execution) -- doesn't require a real display or
      # a working tkinterdnd2 import, so this step is reliable on every OS
      # even where a hosted runner's Tk support is flaky.
      - name: Syntax-check source files
        run: python -m compileall -q main.py psovmu

      - name: Run test suite
        run: python -m pytest tests/ -v

  android-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Constructing any real Kivy widget (Label, Button, ...) lazily creates
      # an actual SDL2 window/GL context on first use -- Ubuntu runners have
      # no display server at all, so this needs a virtual one (Xvfb).
      # macOS/Windows runners already have an interactive desktop session.
      - name: Install Xvfb (Ubuntu only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      # Only fileio.py's Android/SAF branch is left untested -- it needs
      # pyjnius + a real Activity, which only exist in a packaged APK (see
      # android/README.md). Everything else here, including main.py/
      # item_screens.py's real widget tree, runs for real.
      - name: Install dependencies
        run: pip install -r android/requirements-dev.txt

      - name: Run android test suite (Linux, via Xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run -a python -m pytest android/tests/ -v

      - name: Run android test suite
        if: runner.os != 'Linux'
        run: python -m pytest android/tests/ -v
