name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.13"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Ubuntu's default python3 package excludes tkinter; macOS/Windows
      # runners already include it via actions/setup-python.
      - name: Install Tk (Ubuntu only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      # Syntax-check only (no execution) -- doesn't require a real display or
      # a working tkinterdnd2 import, so this step is reliable on every OS
      # even where a hosted runner's Tk support is flaky.
      - name: Syntax-check source files
        run: python -m compileall -q main.py psovmu

      - name: Run test suite
        run: python -m pytest tests/ -v

  android-test:
    strategy:
      fail-fast: false
      matrix:
        # No windows-latest: Kivy's freshly-downloaded DLLs (SDL2, GLEW,
        # ANGLE) reliably hang this job for the full 15-minute timeout on
        # GitHub's Windows-hosted runners, every time, regardless of three
        # different fixes tried (a timeout around the window-creation probe,
        # then skipping that probe outright) -- confirmed via job logs that
        # the hang happens between pytest's session-start banner and its
        # first "collecting ..." line, i.e. before any test file is even
        # imported, which rules out anything in this repo's own test code.
        # Most likely cause: Windows Defender's real-time scan blocking the
        # first load of those large, unsigned, freshly-installed DLLs into
        # any process on the fresh runner VM (a known slow-CI pattern for
        # native-dependency-heavy Python packages on GitHub's Windows
        # runners) -- not confirmed with certainty, since Windows doesn't
        # surface that scan to stdout and there's no interactive shell on
        # the runner to inspect it directly. A real Windows developer
        # machine (already-installed, already-scanned DLLs) doesn't hit
        # this; only a pristine per-run CI VM does. Not worth further CI
        # cycles chasing given Linux (via Xvfb, below) already provides real
        # widget-test coverage; `test` above still covers Windows for
        # everything that doesn't touch Kivy.
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.13"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Constructing any real Kivy widget (Label, Button, ...) lazily creates
      # an actual SDL2 window/GL context on first use. Ubuntu runners have no
      # display server at all, so this needs a virtual one (Xvfb) -- this is
      # the only CI platform where main.py/item_screens.py's real widget tree
      # actually gets constructed and driven. macOS runners have no display
      # either and no headless fallback, so android/tests/conftest.py skips
      # those tests outright there (see _detect_kivy_window_support) -- a
      # real macOS developer machine still gets them, since that failure mode
      # wasn't observed outside CI. timeout-minutes above is a backstop
      # against a future unrelated hang, not the primary defense for this.
      - name: Install Xvfb (Ubuntu only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      # main.py/item_screens.py's real widget tree only runs for real on
      # Linux (see above); fileio.py's Android/SAF branch is untested
      # everywhere -- it needs pyjnius + a real Activity, which only exist in
      # a packaged APK (see android/README.md).
      - name: Install dependencies
        run: pip install -r android/requirements-dev.txt

      - name: Run android test suite (Linux, via Xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run -a python -m pytest android/tests/ -v

      - name: Run android test suite
        if: runner.os != 'Linux'
        run: python -m pytest android/tests/ -v
